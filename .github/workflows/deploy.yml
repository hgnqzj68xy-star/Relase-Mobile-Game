name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "data/games.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ✅ Valider le JSON avant déploiement
        run: |
          python3 -c "
          import json, sys
          try:
              with open('data/games.json') as f:
                  d = json.load(f)
              games = d.get('games', [])
              if not games:
                  print('WARN: games.json vide — déploiement annulé')
                  sys.exit(1)
              print(f'JSON valide : {len(games)} jeux')
          except Exception as e:
              print(f'ERROR JSON : {e}')
              sys.exit(1)
          "

      - name: 📊 Résumé avant déploiement
        run: |
          python3 -c "
          import json
          with open('data/games.json') as f:
              d = json.load(f)
          games    = d.get('games', [])
          ios      = sum(1 for g in games if 'ios'     in g.get('platform', []))
          android  = sum(1 for g in games if 'android' in g.get('platform', []))
          upcoming = sum(1 for g in games if g.get('status') == 'upcoming')
          months   = sorted(set(g['releaseDate'][:7] for g in games))
          print('### 🚀 Déploiement GitHub Pages')
          print('')
          print('| Métrique | Valeur |')
          print('|----------|--------|')
          print(f'| Total jeux | **{len(games)}** |')
          print(f'| iOS | {ios} |')
          print(f'| Android | {android} |')
          print(f'| Upcoming | {upcoming} |')
          print(f'| Mois couverts | {\" · \".join(months)} |')
          print(f'| Mis à jour | {d.get(\"lastUpdated\", \"\")} |')
          " >> $GITHUB_STEP_SUMMARY

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Confirmer l'URL
        run: |
          echo "### ✅ Site déployé" >> $GITHUB_STEP_SUMMARY
          echo "URL : ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
