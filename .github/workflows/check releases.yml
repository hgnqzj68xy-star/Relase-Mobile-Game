name: 🔔 Check New Releases

on:
  schedule:
    # Tous les 2 jours à 08h00 UTC (lundi, mercredi, vendredi, dimanche)
    - cron: "0 8 * * 1,3,5,0"
  workflow_dispatch:
    inputs:
      force_check_all:
        description: "Vérifier tous les jeux (pas seulement les upcoming)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  check:
    name: Vérifier les sorties du jour
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔔 Run check releases
        run: python scripts/check_releases.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: 📊 Résumé
        run: |
          python3 -c "
          import json
          from datetime import datetime
          with open('data/games.json') as f:
              d = json.load(f)
          games    = d.get('games', [])
          upcoming = [g for g in games if g.get('status') == 'upcoming']
          released = [g for g in games if g.get('status') == 'released']
          today    = datetime.utcnow().strftime('%Y-%m-%d')
          new_today = [g for g in released if g.get('releaseDate') == today]

          print('### 🔔 Vérification sorties du jour')
          print('')
          print(f'**Date** : {today}')
          print('')
          print('| Métrique | Valeur |')
          print('|----------|--------|')
          print(f'| Total jeux | {len(games)} |')
          print(f'| Released | {len(released)} |')
          print(f'| Upcoming | {len(upcoming)} |')
          print(f'| Sortis aujourd hui | **{len(new_today)}** |')
          print('')
          if new_today:
              print('#### 🎮 Jeux sortis aujourd hui')
              for g in new_today:
                  plat = ' + '.join(g.get('platform', []))
                  print(f'- **{g[\"title\"]}** ({plat}) — {g.get(\"price\",\"\")}')
          if upcoming:
              print('')
              print('#### 🔜 Prochaines sorties')
              for g in sorted(upcoming, key=lambda x: x['releaseDate'])[:5]:
                  print(f'- {g[\"releaseDate\"]} — **{g[\"title\"]}**')
          " >> $GITHUB_STEP_SUMMARY

      - name: 💾 Commit si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json data/games.backup.json || true
          if git diff --staged --quiet; then
            echo "Aucun changement detecte"
          else
            DATE=$(date +'%Y-%m-%d')
            UPCOMING=$(python3 -c "import json; d=json.load(open('data/games.json')); print(sum(1 for g in d['games'] if g.get('status')=='upcoming'))")
            RELEASED=$(python3 -c "import json; d=json.load(open('data/games.json')); print(sum(1 for g in d['games'] if g.get('status')=='released'))")
            git commit -m "🔔 Check releases [${DATE}] — ${RELEASED} sortis / ${UPCOMING} upcoming"
            git push
            echo "Push effectue"
          fi
